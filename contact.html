    <div class="contact">
        <div class="container">
            <h1 class="text-center mb-5"><span class="accent-text">Get In Touch</span></h1>
            <div class="row">
                <div class="col-md-5">
                    <img src="img/Contact-us.png" alt="Contact" id="contact-image">
                    <div class="details-card">
                        <h5 class="card-title">Contact Details</h5>
                        <hr>
                        <ul class="list-unstyled">
                            <li class="mb-3">
                                <strong>Email:</strong><br>
                                <a href="mailto:sakib3963@gmail.com" class="contact-link">sakib3963@gmail.com</a>
                            </li>
                            <li class="mb-3">
                                <strong>Phone:</strong><br>
                                <a href="tel:+8801621554760" class="contact-link">+8801621554760</a>
                            </li>
                            <li class="mb-3">
                                <strong>Socials:</strong><br>
                                <a href="https://www.facebook.com/abumusa.sakib" target="_blank" class="contact-link d-block">Facebook</a>
                                <a href="https://www.instagram.com/abumusasakib/" target="_blank" class="contact-link d-block">Instagram</a>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="col-md-7">
                    <div class="contact-card">
                        <form action="https://formspree.io/f/xyzkvpql" method="POST">
                            <div class="mb-3">
                                <label for="name" class="form-label">Name</label>
                                <input type="text" name="name" class="form-control" id="name" placeholder="Full Name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">Email Address</label>
                                <input type="email" name="email" class="form-control" id="email" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-3">
                                <label for="phone" class="form-label">Phone Number (Optional)</label>
                                <input type="text" name="phone" class="form-control" id="phone" placeholder="+123456789">
                            </div>
                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea name="message" class="form-control" id="message" rows="5" placeholder="Your message here..." required></textarea>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn-primary-modern">Send Message</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
