  <div class="contact">
   <div class="container">
    <h1 class="text-center mb-5">
     <span class="accent-text">
      Get In Touch
     </span>
    </h1>
    <div class="row">
     <div class="col-md-5">
      <img alt="Contact" id="contact-image" src="img/Contact-us.png"/>
      <div class="details-card">
       <h5 class="card-title">
        Contact Details
       </h5>
       <hr/>
       <ul class="list-unstyled">
        <li class="mb-3">
         <strong>
          Email:
         </strong>
         <br/>
         <a class="contact-link" href="mailto:abu.musa.sakib@cellosco.pe">
          abu.musa.sakib@cellosco.pe
         </a>
        </li>
        <li class="mb-3">
         <strong>
          Phone:
         </strong>
         <br/>
         <a class="contact-link" href="tel:8801621554760">
          8801621554760
         </a>
        </li>
        <li class="mb-3">
         <strong>
          Socials:
         </strong>
         <br/>
         <a class="contact-link d-block" href="https://www.linkedin.com/in/abu-musa-sakib-15895716b/" target="_blank">
          LinkedIn
         </a>
         <a class="contact-link d-block" href="https://github.com/abumusasakib" target="_blank">
          GitHub
         </a>
        </li>
       </ul>
      </div>
     </div>
     <div class="col-md-7">
      <div class="contact-card">
       <form action="https://formspree.io/f/xyzkvpql" method="POST">
        <div class="mb-3">
         <label class="form-label" for="name">
          Name
         </label>
         <input class="form-control" id="name" name="name" placeholder="Full Name" required="" type="text"/>
        </div>
        <div class="mb-3">
         <label class="form-label" for="email">
          Email Address
         </label>
         <input class="form-control" id="email" name="email" placeholder="name@example.com" required="" type="email"/>
        </div>
        <div class="mb-3">
         <label class="form-label" for="phone">
          Phone Number (Optional)
         </label>
         <input class="form-control" id="phone" name="phone" placeholder="+123456789" type="text"/>
        </div>
        <div class="mb-3">
         <label class="form-label" for="message">
          Message
         </label>
         <textarea class="form-control" id="message" name="message" placeholder="Your message here..." required="" rows="5"></textarea>
        </div>
        <div class="d-grid gap-2">
         <button class="btn-primary-modern" type="submit">
          Send Message
         </button>
        </div>
       </form>
      </div>
     </div>
    </div>
